###############################################################################
# ABC-Technologies
# Enterprise Ansible Inventory
#
# Project : ABC-Technologies
# Purpose : Kubernetes Cluster Inventory
#
# Current Workflow
# ----------------
# All Kubernetes deployments are executed from the Kubernetes Control Plane
# (k8s-master) using kubectl.
#
# Worker nodes are documented for future infrastructure automation but are
# intentionally NOT included in the kubernetes_cluster group.
###############################################################################

###############################################################################
# Kubernetes Control Plane
###############################################################################

[kubernetes_master]

k8s-master ansible_host=192.168.56.10 ansible_user=bharat ansible_python_interpreter=/usr/bin/python3

###############################################################################
# Kubernetes Worker Nodes
#
# Reserved for future playbooks such as:
#
# - Operating System Updates
# - Container Runtime Maintenance
# - Kubelet Maintenance
# - Disk Cleanup
# - Log Collection
# - Infrastructure Validation
#
# These nodes are NOT used for deployment playbooks.
###############################################################################

[kubernetes_workers]

k8s-worker1 ansible_host=192.168.56.11 ansible_user=bharat ansible_python_interpreter=/usr/bin/python3

k8s-worker2 ansible_host=192.168.56.12 ansible_user=bharat ansible_python_interpreter=/usr/bin/python3

###############################################################################
# Infrastructure Worker Nodes
#
# Current Labels
# role=infra
###############################################################################

[infra_nodes]

k8s-worker1

###############################################################################
# Application Worker Nodes
#
# Current Labels
# role=app
###############################################################################

[application_nodes]

k8s-worker2

###############################################################################
# Kubernetes Deployment Group
#
# IMPORTANT
# ---------
# Deployment playbooks execute ONLY on the Kubernetes Control Plane.
#
# Current Playbooks:
#
# - deploy.yml
# - rollback.yml
# - auto-fix.yml
# - health-check.yml
# - verify-monitoring.yml
#
# These playbooks use kubectl and therefore must execute only once from the
# control-plane node.
###############################################################################

[kubernetes_cluster:children]

kubernetes_master

###############################################################################
# Global Variables
###############################################################################

[kubernetes_cluster:vars]

###############################################################################
# Connection
###############################################################################

ansible_connection=ssh

###############################################################################
# Privilege Escalation
###############################################################################

ansible_become=True
ansible_become_method=sudo

###############################################################################
# SSH Options
###############################################################################

ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

###############################################################################
# SSH Private Key
#
# Jenkins injects the SSH key automatically using:
#
# withCredentials([
#   sshUserPrivateKey(...)
# ])
#
# Uncomment only when executing manually.
###############################################################################

# ansible_ssh_private_key_file=~/.ssh/id_rsa