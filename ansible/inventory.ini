###############################################################################
# Kubernetes Control Plane
###############################################################################

[kubernetes_master]

k8s-master ansible_host=192.168.56.10 ansible_user=bharat ansible_python_interpreter=/usr/bin/python3

###############################################################################
# Kubernetes Cluster
#
# Deployments are executed through the control plane.
###############################################################################

[kubernetes_cluster:children]

kubernetes_master

###############################################################################
# Global Variables
###############################################################################

[kubernetes_cluster:vars]

###############################################################################
# Connection
###############################################################################

ansible_connection=ssh

###############################################################################
# Privilege Escalation
###############################################################################

ansible_become=True
ansible_become_method=sudo

###############################################################################
# SSH Options
###############################################################################

ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

###############################################################################
# SSH Private Key
#
# Jenkins injects the SSH key automatically using:
#
# withCredentials([
#   sshUserPrivateKey(...)
# ])
#
# Uncomment only when executing manually.
###############################################################################

# ansible_ssh_private_key_file=~/.ssh/id_rsa