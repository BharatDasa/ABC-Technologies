###############################################################################
# ABC-Technologies
# Global Variables
#
# Purpose:
# Shared application configuration used by all Ansible playbooks.
#
###############################################################################

###############################################################################
# Application
###############################################################################

app_name: abc-technologies

deployment_environment: production

###############################################################################
# Docker Registry
###############################################################################

registry: "192.168.56.11:8082"

repository: "{{ app_name }}"

###############################################################################
# Image
#
# Jenkins overrides image_tag:
#
# ansible-playbook deploy.yml \
#   -e image_tag=v25
#
###############################################################################

image_tag: latest

image: "{{ registry }}/{{ repository }}:{{ image_tag }}"

###############################################################################
# Kubernetes
###############################################################################

k8s_namespace: "{{ app_name }}"

deployment_name: "{{ app_name }}"

container_name: "{{ app_name }}"

replicas: 3

###############################################################################
# Container
###############################################################################

container_port: 8080

###############################################################################
# Service
###############################################################################

service_name: "{{ app_name }}"

service_type: ClusterIP

service_port: 80

target_port: 8080

###############################################################################
# Ingress
###############################################################################

ingress_enabled: true

ingress_name: "{{ app_name }}"

ingress_class: nginx

ingress_host: "abc.192.168.56.100.nip.io"

###############################################################################
# Istio
###############################################################################

istio_enabled: true

istio_namespace: istio-system

###############################################################################
# Monitoring
###############################################################################

monitoring_enabled: true

monitoring_namespace: monitoring

servicemonitor_enabled: true

###############################################################################
# Horizontal Pod Autoscaler
###############################################################################

hpa_enabled: true

min_replicas: 2

max_replicas: 10

target_cpu_utilization: 70

###############################################################################
# Resource Requests
###############################################################################

cpu_request: "250m"

memory_request: "512Mi"

cpu_limit: "1000m"

memory_limit: "1024Mi"

###############################################################################
# Storage
###############################################################################

storage_class: nfs-client

###############################################################################
# Health Check
###############################################################################

health_path: "/"

application_url: "http://abc.192.168.56.100.nip.io"

rollout_timeout: "180s"

###############################################################################
# Deployment Strategy
###############################################################################

deployment_strategy: RollingUpdate

max_unavailable: 1

max_surge: 1

###############################################################################
# Logging
###############################################################################

log_level: INFO

###############################################################################
# Labels
###############################################################################

app_labels:

  app: "{{ app_name }}"

  environment: "{{ deployment_environment }}"

  managed-by: ansible