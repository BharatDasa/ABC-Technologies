###############################################################################
# ABC-Technologies
# Host Variables
#
# Host    : k8s-master
# Purpose : Configuration specific to the Kubernetes Control Plane
#
###############################################################################

###############################################################################
# Kubernetes Control Plane
###############################################################################

control_plane: true

###############################################################################
# kubectl
###############################################################################

kubectl_binary: /usr/bin/kubectl

###############################################################################
# kubeconfig
###############################################################################

kubeconfig: /home/bharat/.kube/config

###############################################################################
# Kubernetes API Server
###############################################################################

api_server: "https://192.168.56.10:6443"

###############################################################################
# SSH User
###############################################################################

ssh_user: bharat

###############################################################################
# Temporary Deployment Directory
#
# Jenkins copies Kubernetes manifests here during deployment.
# This directory is recreated on every deployment.
###############################################################################

tmp_directory: "/tmp/abc-technologies"

###############################################################################
# Kubernetes Manifest Directory
###############################################################################

manifest_directory: "{{ tmp_directory }}/kubernetes"

###############################################################################
# Temporary Manifest Backup
###############################################################################

backup_directory: "{{ tmp_directory }}/backup"

###############################################################################
# kubectl Rollout Timeout
###############################################################################

kubectl_timeout: 180s

###############################################################################
# Cleanup After Deployment
###############################################################################

cleanup_tmp_directory: true

###############################################################################
# Kubernetes Context
###############################################################################

kube_context: ""

###############################################################################
# Deployment Validation
###############################################################################

verify_rollout: true

verify_pods: true

verify_service: true

verify_ingress: true

verify_hpa: true

verify_servicemonitor: true