---
###############################################################################
# ABC-Technologies
# Deployment Playbook
#
# Purpose:
# Deploy the application to Kubernetes
#
###############################################################################

- name: Deploy ABC-Technologies

  hosts: kubernetes_cluster

  gather_facts: false

  become: true

  vars_files:
    - ../group_vars/all.yml

  tasks:

###############################################################################
# Deployment Summary
###############################################################################

    - name: Deployment Summary

      debug:
        msg:
          - "Application : {{ app_name }}"
          - "Image       : {{ image }}"
          - "Namespace   : {{ namespace }}"
          - "Environment : {{ environment }}"

###############################################################################
# Create Temporary Directory
###############################################################################

    - name: Create deployment directory

      file:

        path: "{{ tmp_directory }}"

        state: directory

        mode: '0755'

###############################################################################
# Remove Previous Kubernetes Manifests
###############################################################################

    - name: Remove previous manifests

      file:

        path: "{{ manifest_directory }}"

        state: absent

###############################################################################
# Copy Kubernetes Manifests
###############################################################################

    - name: Copy Kubernetes manifests

      copy:

        src: "{{ workspace }}/kubernetes/"

        dest: "{{ manifest_directory }}/"

        mode: preserve

###############################################################################
# Verify Manifests
###############################################################################

    - name: Verify copied manifests

      command:

        ls -la "{{ manifest_directory }}"

      register: manifest_files

      changed_when: false

    - debug:

        var: manifest_files.stdout_lines

###############################################################################
# Update Deployment Image
###############################################################################

    - name: Replace IMAGE_PLACEHOLDER

      replace:

        path: "{{ manifest_directory }}/deployment.yaml"

        regexp: 'IMAGE_PLACEHOLDER'

        replace: "{{ image }}"

###############################################################################
# Verify Image Replacement
###############################################################################

    - name: Verify deployment image

      shell: |

        grep image "{{ manifest_directory }}/deployment.yaml"

      register: deployment_image

      changed_when: false

    - debug:

        var: deployment_image.stdout_lines

###############################################################################
# Deploy Application
###############################################################################

    - name: Deploy Kubernetes resources

      command: >

        {{ kubectl_binary }}

        apply

        -k

        {{ manifest_directory }}

      environment:

        KUBECONFIG: "{{ kubeconfig }}"

      register: deployment_result

###############################################################################
# Display Deployment Output
###############################################################################

    - debug:

        var: deployment_result.stdout_lines

        ###############################################################################
# Wait for Deployment Rollout
###############################################################################

    - name: Wait for Deployment Rollout

      command: >

        {{ kubectl_binary }}

        rollout

        status

        deployment/{{ deployment_name }}

        -n {{ namespace }}

        --timeout={{ rollout_timeout }}

      environment:

        KUBECONFIG: "{{ kubeconfig }}"

###############################################################################
# Deployment Information
###############################################################################

    - name: Get Deployment Status

      command: >

        {{ kubectl_binary }}

        get

        deployment

        {{ deployment_name }}

        -n {{ namespace }}

      environment:

        KUBECONFIG: "{{ kubeconfig }}"

      register: deployment_status

      changed_when: false

    - debug:

        var: deployment_status.stdout_lines

###############################################################################
# Pod Information
###############################################################################

    - name: Get Running Pods

      command: >

        {{ kubectl_binary }}

        get

        pods

        -n {{ namespace }}

        -o wide

      environment:

        KUBECONFIG: "{{ kubeconfig }}"

      register: pod_status

      changed_when: false

    - debug:

        var: pod_status.stdout_lines

###############################################################################
# Service Information
###############################################################################

    - name: Get Service

      command: >

        {{ kubectl_binary }}

        get

        svc

        {{ service_name }}

        -n {{ namespace }}

      environment:

        KUBECONFIG: "{{ kubeconfig }}"

      register: service_status

      changed_when: false

    - debug:

        var: service_status.stdout_lines

###############################################################################
# Ingress Information
###############################################################################

    - name: Get Ingress

      command: >

        {{ kubectl_binary }}

        get

        ingress

        {{ ingress_name }}

        -n {{ namespace }}

      environment:

        KUBECONFIG: "{{ kubeconfig }}"

      register: ingress_status

      changed_when: false

      when: ingress_enabled

    - debug:

        var: ingress_status.stdout_lines

      when: ingress_enabled

###############################################################################
# Horizontal Pod Autoscaler
###############################################################################

    - name: Get HPA

      command: >

        {{ kubectl_binary }}

        get

        hpa

        -n {{ namespace }}

      environment:

        KUBECONFIG: "{{ kubeconfig }}"

      register: hpa_status

      changed_when: false

      when: hpa_enabled

    - debug:

        var: hpa_status.stdout_lines

      when: hpa_enabled

###############################################################################
# ServiceMonitor
###############################################################################

    - name: Get ServiceMonitor

      command: >

        {{ kubectl_binary }}

        get

        servicemonitor

        {{ app_name }}

        -n {{ monitoring_namespace }}

      environment:

        KUBECONFIG: "{{ kubeconfig }}"

      register: servicemonitor_status

      changed_when: false

      failed_when: false

      when: servicemonitor_enabled

    - debug:

        var: servicemonitor_status.stdout_lines

      when: servicemonitor_enabled

###############################################################################
# Deployment Summary
###############################################################################

    - name: Deployment Completed

      debug:

        msg:
          - "========================================"
          - "ABC-Technologies deployed successfully"
          - "Namespace : {{ namespace }}"
          - "Deployment: {{ deployment_name }}"
          - "Image     : {{ image }}"
          - "URL       : {{ application_url }}"
          - "========================================"