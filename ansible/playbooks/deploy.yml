---
###############################################################################
# ABC-Technologies
# Deployment Playbook
#
# Purpose:
# Deploy the application to Kubernetes
###############################################################################

- name: Deploy ABC-Technologies

  hosts: kubernetes_cluster
  gather_facts: false
  become: true

  vars_files:
    - ../group_vars/all.yml

  pre_tasks:

    ###########################################################################
    # Validate Jenkins Variables
    ###########################################################################

    - name: Verify Jenkins workspace variable
      fail:
        msg: "workspace variable was not passed from Jenkins."
      when:
        - workspace is not defined
        - workspace | length == 0

    - name: Display Deployment Summary
      debug:
        msg:
          - "Application : {{ app_name }}"
          - "Image       : {{ image }}"
          - "Namespace   : {{ k8s_namespace }}"
          - "Environment : {{ deployment_environment }}"
          - "Workspace   : {{ workspace }}"

  tasks:

###############################################################################
# Create Temporary Directory
###############################################################################

    - name: Create deployment directory
      file:
        path: "{{ tmp_directory }}"
        state: directory
        mode: "0755"

###############################################################################
# Remove Previous Kubernetes Manifests
###############################################################################

    - name: Remove previous manifests
      file:
        path: "{{ manifest_directory }}"
        state: absent

###############################################################################
# Recreate Manifest Directory
###############################################################################

    - name: Create manifest directory
      file:
        path: "{{ manifest_directory }}"
        state: directory
        mode: "0755"

###############################################################################
# Copy Kubernetes Manifests
###############################################################################

    - name: Copy Kubernetes manifests
      copy:
        src: "{{ workspace }}/kubernetes/"
        dest: "{{ manifest_directory }}/"
        mode: preserve

###############################################################################
# Verify Manifests
###############################################################################

    - name: Verify copied manifests
      command: ls -la "{{ manifest_directory }}"
      register: manifest_files
      changed_when: false

    - name: Display copied manifests
      debug:
        var: manifest_files.stdout_lines

###############################################################################
# Replace Image
###############################################################################

    - name: Replace IMAGE_PLACEHOLDER
      replace:
        path: "{{ manifest_directory }}/deployment.yaml"
        regexp: "IMAGE_PLACEHOLDER"
        replace: "{{ image }}"

###############################################################################
# Verify Image Replacement
###############################################################################

    - name: Verify deployment image
      shell: |
        grep "image:" "{{ manifest_directory }}/deployment.yaml"
      register: deployment_image
      changed_when: false

    - name: Display deployment image
      debug:
        var: deployment_image.stdout_lines

###############################################################################
# Deploy Kubernetes Resources
###############################################################################

    - name: Deploy Kubernetes resources
      command: >
        {{ kubectl_binary }}
        apply
        -k
        {{ manifest_directory }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: deployment_result
      changed_when: true

###############################################################################
# Display Deployment Output
###############################################################################

    - name: Display deployment output
      debug:
        var: deployment_result.stdout_lines

###############################################################################
# Wait for Deployment Rollout
###############################################################################

    - name: Wait for deployment rollout
      command: >
        {{ kubectl_binary }}
        rollout
        status
        deployment/{{ deployment_name }}
        -n {{ k8s_namespace }}
        --timeout={{ rollout_timeout }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"

###############################################################################
# Deployment Status
###############################################################################

    - name: Get deployment status
      command: >
        {{ kubectl_binary }}
        get deployment
        {{ deployment_name }}
        -n {{ k8s_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: deployment_status
      changed_when: false

    - name: Display deployment status
      debug:
        var: deployment_status.stdout_lines

###############################################################################
# Running Pods
###############################################################################

    - name: Get running pods
      command: >
        {{ kubectl_binary }}
        get pods
        -n {{ k8s_namespace }}
        -o wide
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: pod_status
      changed_when: false

    - name: Display running pods
      debug:
        var: pod_status.stdout_lines

###############################################################################
# Service Status
###############################################################################

    - name: Get service
      command: >
        {{ kubectl_binary }}
        get svc
        {{ service_name }}
        -n {{ k8s_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      register: service_status
      changed_when: false

    - name: Display service
      debug:
        var: service_status.stdout_lines

###############################################################################
# Ingress Status
###############################################################################

    - name: Get ingress
      command: >
        {{ kubectl_binary }}
        get ingress
        {{ ingress_name }}
        -n {{ k8s_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: ingress_enabled
      register: ingress_status
      changed_when: false
      failed_when: false

    - name: Display ingress
      debug:
        var: ingress_status.stdout_lines
      when: ingress_enabled

###############################################################################
# Horizontal Pod Autoscaler
###############################################################################

    - name: Get HPA
      command: >
        {{ kubectl_binary }}
        get hpa
        -n {{ k8s_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: hpa_enabled
      register: hpa_status
      changed_when: false
      failed_when: false

    - name: Display HPA
      debug:
        var: hpa_status.stdout_lines
      when: hpa_enabled

###############################################################################
# ServiceMonitor
###############################################################################

    - name: Get ServiceMonitor
      command: >
        {{ kubectl_binary }}
        get servicemonitor
        {{ app_name }}
        -n {{ monitoring_namespace }}
      environment:
        KUBECONFIG: "{{ kubeconfig }}"
      when: servicemonitor_enabled
      register: servicemonitor_status
      changed_when: false
      failed_when: false

    - name: Display ServiceMonitor
      debug:
        var: servicemonitor_status.stdout_lines
      when: servicemonitor_enabled

###############################################################################
# Deployment Complete
###############################################################################

    - name: Deployment completed
      debug:
        msg:
          - "========================================"
          - "ABC-Technologies deployed successfully"
          - "Namespace : {{ k8s_namespace }}"
          - "Deployment: {{ deployment_name }}"
          - "Image     : {{ image }}"
          - "URL       : {{ application_url }}"
          - "========================================"