apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

###############################################################################
# Namespace
###############################################################################

namespace: abc-technologies

###############################################################################
# Common Labels
###############################################################################

commonLabels:
  app: abc-technologies
  environment: production
  managed-by: kubectl

###############################################################################
# Resources
###############################################################################

resources:
  - namespace.yaml
  - configmap.yaml
  - serviceaccount.yaml
  - networkpolicy.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - hpa.yaml
  - servicemonitor.yaml