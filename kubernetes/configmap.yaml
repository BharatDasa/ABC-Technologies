apiVersion: v1
kind: ConfigMap

metadata:
  name: abc-technologies-config
  namespace: abc-technologies

  labels:
    app: abc-technologies
    environment: production

data:

  ##########################################################
  # Application
  ##########################################################

  APP_NAME: "ABC-Technologies"

  APP_ENV: "production"

  APP_VERSION: "1.0"

  ##########################################################
  # Server
  ##########################################################

  SERVER_PORT: "8080"

  ##########################################################
  # Logging
  ##########################################################

  LOG_LEVEL: "INFO"

  ##########################################################
  # JVM
  ##########################################################

  JAVA_OPTS: "-Xms512m -Xmx1024m"

  ##########################################################
  # Health Endpoint
  ##########################################################

  HEALTH_ENDPOINT: "/"

  ##########################################################
  # Monitoring
  ##########################################################

  METRICS_ENABLED: "true"

  ##########################################################
  # Timezone
  ##########################################################

  TZ: "UTC"