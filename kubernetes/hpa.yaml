apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler

metadata:
  name: abc-technologies
  namespace: abc-technologies

  labels:
    app: abc-technologies
    environment: production
    managed-by: kubectl

spec:

###############################################################################
# Target Deployment
###############################################################################

  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: abc-technologies

###############################################################################
# Replica Limits
###############################################################################

  minReplicas: 2

  maxReplicas: 10

###############################################################################
# Metrics
###############################################################################

  metrics:

    - type: Resource

      resource:

        name: cpu

        target:

          type: Utilization

          averageUtilization: 70

    - type: Resource

      resource:

        name: memory

        target:

          type: Utilization

          averageUtilization: 80

###############################################################################
# Scaling Behaviour
###############################################################################

  behavior:

###############################################################################
# Scale Up
###############################################################################

    scaleUp:

      stabilizationWindowSeconds: 30

      selectPolicy: Max

      policies:

        - type: Percent

          value: 100

          periodSeconds: 60

        - type: Pods

          value: 2

          periodSeconds: 60

###############################################################################
# Scale Down
###############################################################################

    scaleDown:

      stabilizationWindowSeconds: 300

      selectPolicy: Max

      policies:

        - type: Percent

          value: 20

          periodSeconds: 60

        - type: Pods

          value: 1

          periodSeconds: 60