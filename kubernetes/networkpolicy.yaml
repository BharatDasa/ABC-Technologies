apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: abc-technologies-network-policy
  namespace: abc-technologies

  labels:
    app: abc-technologies
    environment: production

spec:

  podSelector:
    matchLabels:
      app: abc-technologies

  policyTypes:
    - Ingress
    - Egress

###############################################################################
# INGRESS
###############################################################################

  ingress:

  #########################################################################
  # Allow communication between application pods
  #########################################################################

  - from:
      - podSelector: {}

  #########################################################################
  # Allow traffic from Platform namespace (NGINX Ingress)
  #########################################################################

  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: platform

  #########################################################################
  # Allow Istio Control Plane / Sidecars
  #########################################################################

  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: istio-system

  #########################################################################
  # Allow Prometheus Scraping
  #########################################################################

  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring

    ports:
      - protocol: TCP
        port: 8080

      - protocol: TCP
        port: 15020

      - protocol: TCP
        port: 15090

###############################################################################
# EGRESS
###############################################################################

  egress:

  #########################################################################
  # DNS
  #########################################################################

  - to:
      - namespaceSelector: {}

    ports:
      - protocol: UDP
        port: 53

      - protocol: TCP
        port: 53

  #########################################################################
  # HTTP
  #########################################################################

  - ports:
      - protocol: TCP
        port: 80

  #########################################################################
  # HTTPS
  #########################################################################

  - ports:
      - protocol: TCP
        port: 443

  #########################################################################
  # Istio Control Plane
  #########################################################################

  - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: istio-system

    ports:
      - protocol: TCP
        port: 15010

      - protocol: TCP
        port: 15012

      - protocol: TCP
        port: 15014

      - protocol: TCP
        port: 15017

  #########################################################################
  # Monitoring Namespace
  #########################################################################

  - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring

  #########################################################################
  # Kubernetes API Server
  #########################################################################

  - ports:
      - protocol: TCP
        port: 6443