apiVersion: networking.k8s.io/v1
kind: NetworkPolicy

metadata:
  name: abc-technologies-network-policy
  namespace: abc-technologies

spec:

  podSelector:
    matchLabels:
      app: abc-technologies

  policyTypes:
    - Ingress
    - Egress

###############################################################################
# INGRESS
###############################################################################

  ingress:

  # Allow communication between application pods
  - from:
      - podSelector: {}

  # Allow traffic from NGINX Ingress namespace
  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: platform

  # Allow traffic from Istio sidecars and gateways
  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: istio-system

  # Allow Prometheus scraping
  - from:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring
    ports:
      - protocol: TCP
        port: 8080

###############################################################################
# EGRESS
###############################################################################

  egress:

  #########################################################################
  # DNS
  #########################################################################

  - to:
      - namespaceSelector: {}
    ports:
      - protocol: UDP
        port: 53
      - protocol: TCP
        port: 53

  #########################################################################
  # HTTP
  #########################################################################

  - ports:
      - protocol: TCP
        port: 80

  #########################################################################
  # HTTPS
  #########################################################################

  - ports:
      - protocol: TCP
        port: 443

  #########################################################################
  # ISTIO CONTROL PLANE (VERY IMPORTANT)
  #########################################################################

  - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: istio-system
    ports:
      - protocol: TCP
        port: 15010
      - protocol: TCP
        port: 15012
      - protocol: TCP
        port: 15014
      - protocol: TCP
        port: 15017

  #########################################################################
  # Prometheus
  #########################################################################

  - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: monitoring

  #########################################################################
  # Kubernetes API Server
  #########################################################################

  - ports:
      - protocol: TCP
        port: 6443