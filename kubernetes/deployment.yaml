apiVersion: apps/v1
kind: Deployment

metadata:
  name: abc-technologies
  namespace: abc-technologies

  labels:
    app: abc-technologies
    environment: production

spec:

  replicas: 3

  revisionHistoryLimit: 10

  strategy:

    type: RollingUpdate

    rollingUpdate:

      maxUnavailable: 1

      maxSurge: 1

  selector:

    matchLabels:

      app: abc-technologies

  template:

    metadata:

      labels:

        app: abc-technologies

        version: v1

    spec:

###############################################################################
# Service Account
###############################################################################

      serviceAccountName: abc-technologies-sa

###############################################################################
# Schedule Application Pods on Application Worker
###############################################################################

      nodeSelector:

        role: app

###############################################################################
# Pod Anti Affinity
###############################################################################

      affinity:

        podAntiAffinity:

          preferredDuringSchedulingIgnoredDuringExecution:

          - weight: 100

            podAffinityTerm:

              topologyKey: kubernetes.io/hostname

              labelSelector:

                matchExpressions:

                - key: app

                  operator: In

                  values:

                  - abc-technologies

###############################################################################
# Security Context
###############################################################################

      securityContext:

        runAsNonRoot: true

        runAsUser: 1000

        fsGroup: 1000

###############################################################################
# Container
###############################################################################

      containers:

      - name: abc-technologies

        image: IMAGE_PLACEHOLDER

        imagePullPolicy: Always

###############################################################################
# Port
###############################################################################

        ports:

        - containerPort: 8080

###############################################################################
# ConfigMap
###############################################################################

        envFrom:

        - configMapRef:

            name: abc-technologies-config

###############################################################################
# Resources
###############################################################################

        resources:

          requests:

            cpu: "250m"

            memory: "512Mi"

          limits:

            cpu: "1000m"

            memory: "1024Mi"

###############################################################################
# Liveness Probe
###############################################################################

        livenessProbe:

          httpGet:

            path: /

            port: 8080

          initialDelaySeconds: 30

          periodSeconds: 10

          timeoutSeconds: 5

          failureThreshold: 3

###############################################################################
# Readiness Probe
###############################################################################

        readinessProbe:

          httpGet:

            path: /

            port: 8080

          initialDelaySeconds: 15

          periodSeconds: 5

          timeoutSeconds: 5

          failureThreshold: 3

###############################################################################
# Startup Probe
###############################################################################

        startupProbe:

          httpGet:

            path: /

            port: 8080

          failureThreshold: 30

          periodSeconds: 10

###############################################################################
# Graceful Shutdown
###############################################################################

        lifecycle:

          preStop:

            exec:

              command:

              - /bin/sh

              - -c

              - sleep 15

###############################################################################
# Termination
###############################################################################

      terminationGracePeriodSeconds: 30